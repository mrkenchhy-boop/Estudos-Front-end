        document.write (`Olá <strong>${nome}</strong>. Seu nome tem ${nome.length} letras.<br>`)

    + : MAIS
    - : MENOS
    * : MULTIPLICA
    / : DIVIDE
    % : RESTO DA DIVISÃO
    ** : POTÊNCIA

| Operador    | Nome                | Exemplo  | Resultado |
| --------    | ----------------    | -------- | --------- |
| `+`         | Soma                | `5 + 2`  |    `7`    |
| `-`         | Subtração           | `5 - 2`  | `3`       |
| `*`         | Multiplicação       | `5 * 2`  | `10`      |
| `/`         | Divisão             | `10 / 2` | `5`       |
| `%`         | Resto da divisão    | `10 % 3` | `1`       |
| `**`        | Potência            | `2 ** 3` | `8`       |

ORDEM DE PRECEDENCIA
Parênteses ()
Potência **
Multiplicação *, divisão / e resto %
Soma + e subtração -

ATRIBUIÇÃO SIMPLES
var a = 5+3  {8}

var c = 5 * b ** 2 {45}
var d = 10 - a / 2 {6}
var e = 6 * 2 / d {2} 
var f = b % e + 4 / e {3}
