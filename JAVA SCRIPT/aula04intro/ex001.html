<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS</title>
    <style>
        body {
            background-color: rgb(99, 99, 196);
            color: rgb(255, 255, 255);
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <h1>HELLO, WORLD!</h1>
    /* */
    <script>
        window.alert("Minha Primeira Mensagem!") // Janela de alerta com a mensagem "Minha Primeira Mensagem!"
        window.confirm("Deseja Continuar?") // Janela com opções de "OK" e "Cancelar"
        window.prompt("Qual é o seu nome?") // Janela para o usuário digitar seu nome, retornando o valor digitado
    </script>
</body>
</html>
