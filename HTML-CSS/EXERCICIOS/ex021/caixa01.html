<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
    h1 {
        background-color: lightgrey;
        height: 300px;
        width: 300px;

        border-width: 10px;
        border-style: solid;
        border-color: rgb(0, 0, 0);

       border: 10px solid black; /* Forma abreviada para definir a largura, estilo e cor da borda */

        padding-top: 10px;
        padding-right: 10px;
        padding-bottom: 10px;
        padding-left: 10px;
        
      padding: 10px; /* Forma abreviada para definir o preenchimento em ordem: topo, direita, inferior, esquerda informa tudo*/

        margin-top: 10px;
        margin-right: 10px;
        margin-bottom: 50px;
        margin-left: 10px;
        
        
        margin: 10px 10px 50px 10px; /* Forma abreviada para definir as margens em ordem: topo, direita, inferior, esquerda */

        outline-width: 5px;
        outline-color: red;
        outline-style: solid;

        outline: 5px solid red; /* Forma abreviada para definir a largura, cor e estilo do contorno */
        
    }
    a {
        Border-width: 10px;
        Border-color: black;
        Border-style: solid;
        padding-bottom: 10px;
        padding-left: 10px;
        padding-right: 10px;
        padding-top: 10px;
        margin-top: 10px;
        margin-bottom: 10px;
        margin-left: 10px;
        margin-right: 10px;
        
    }
    </style>
</head>
<body>
    <h1>Exemplo de caixa Box-Level</h1>
    <p>Parágrafo também é um exemplo de Box-Level, mas os <a href="#">São exemplos de Inline-Level</a>Vamos ver como tudo isso funciona.</p>
</body>
</html>
