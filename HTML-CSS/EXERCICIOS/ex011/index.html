<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em html5</title>
</head>
<body>
    <h1>Imagem dinâmica</h1>
    <p>Tente abrir esses sites em vários dispositivos diferentes, ou simplesmente aumente ou dimunua o tamanho do seu navegador</p>
    <picture>
        <source media="(max-width: 750px )" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px )" srcset="imagens/foto-m.png" type="image/png">
        <img src="Imagens/foto-g.png" alt="Imagem flexível">

    </picture>
    <h1>Reproduzindo áudio </h1>
    <p>Vamos aprender a reproduzir áudio em HTML5</p>
    <audio preload="metadata" autoplay controls loop>
<source src="midia/stereo love.mp3" type="audio/mpeg" controls>
<source src="midia/stereo love.ogg" type="audio/ogg" controls>
<source src="midia/stereo love.wav" type="audio/wav" controls>
<p>Infelizmente seu navegador não suporta a reprodução deste áudio. <a href="midia/stereo love.mp3">Clique aqui para baixar o áudio</a></p>
    </audio>

</body>
</html>
