<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paragráfos</title>
</head>
<body>
    <h1>Paragráfos e quebras de linha</h1>
    <hr>
    <p>Você pode eescrever tudo do seu jeito.
        basta colocar tudo no meio do par de tags &lt;p&gt e &lt;/p&gt <!--Lt significa LESS THAN e GT significa GREATER THAN-->
    </p>
    <p>se você quiser quebrar <br> a linha, pode usar a tag &lt;br&gt;</p>
    <p>Vamos adicionar alguns simbolos especiais: 
    &copy;
    &reg;
    &trade;
    &euro;
    &pound;
    &yen;
    &cent;
    &delta;
    &uparrow;
    &Uarr;
    </p>
    <p>Vamos Adicionar emojis:
    💜 ❤️ 💖 😊😊🥹 🏃  &#x1F3C3
    </p>
</body>
</html>
